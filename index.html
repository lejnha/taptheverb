<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenNote — taptheverb.life</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--bg2:#f3f2f0;--bg3:#eceae6;
  --surface:#fff;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1a1917;--text2:#6b6760;--text3:#9d9a94;
  --radius:10px;--radius-sm:6px;
  --c-todo-bg:#E6F1FB;--c-todo:#185FA5;
  --c-sched-bg:#EAF3DE;--c-sched:#3B6D11;
  --c-buy-bg:#FAECE7;--c-buy:#993C1D;
  --c-ref-bg:#FAEEDA;--c-ref:#854F0B;
  --c-think-bg:#F1EFE8;--c-think:#5F5E5A;
  --c-check-bg:#EEEDFE;--c-check:#3C3489;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18181b;--bg2:#1f1f23;--bg3:#27272b;
  --surface:#1f1f23;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --text:#f4f4f5;--text2:#a1a1aa;--text3:#71717a;
}}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── 로그인 화면 ── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;padding:2rem;text-align:center;gap:1.5rem
}
.login-logo{font-size:32px;font-weight:700;letter-spacing:-.04em;color:var(--text)}
.login-sub{font-size:15px;color:var(--text2);max-width:300px;line-height:1.6}
.google-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 24px;border-radius:var(--radius);
  border:0.5px solid var(--border2);background:var(--surface);
  color:var(--text);font-size:15px;font-weight:500;cursor:pointer;
  transition:background .12s;width:100%;max-width:280px;justify-content:center
}
.google-btn:hover{background:var(--bg2)}
.google-icon{width:20px;height:20px;flex-shrink:0}
.login-footer{font-size:11px;color:var(--text3);max-width:280px;line-height:1.6}

/* ── 앱 전체 ── */
#app-screen{display:none}
.shell{max-width:680px;margin:0 auto;padding:1.25rem 1rem 4rem}

/* ── 네비바 ── */
.navbar{
  display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;
  padding-bottom:1rem;border-bottom:0.5px solid var(--border)
}
.nav-logo{font-size:16px;font-weight:700;letter-spacing:-.03em;color:var(--text);flex:1}
.nav-planner{
  font-size:12px;padding:5px 12px;border-radius:20px;
  border:0.5px solid var(--border2);background:var(--surface);
  color:var(--text2);text-decoration:none;transition:background .1s
}
.nav-planner:hover{background:var(--bg2)}
.nav-avatar{
  width:28px;height:28px;border-radius:50%;overflow:hidden;cursor:pointer;
  border:0.5px solid var(--border2);flex-shrink:0
}
.nav-avatar img{width:100%;height:100%;object-fit:cover}
.nav-avatar-placeholder{
  width:28px;height:28px;border-radius:50%;
  background:var(--c-check-bg);color:var(--c-check);
  font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:0.5px solid rgba(60,52,137,.2)
}

/* ── 드롭다운 메뉴 ── */
.user-menu{
  position:fixed;top:60px;right:1rem;z-index:500;
  background:var(--surface);border:0.5px solid var(--border2);
  border-radius:var(--radius);box-shadow:0 6px 24px rgba(0,0,0,.1);
  overflow:hidden;display:none;min-width:200px
}
.user-menu.open{display:block}
.user-menu-header{padding:12px 16px;border-bottom:0.5px solid var(--border)}
.user-menu-name{font-size:13px;font-weight:500;color:var(--text)}
.user-menu-email{font-size:11px;color:var(--text3);margin-top:2px}
.user-menu-item{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  font-size:13px;color:var(--text2);cursor:pointer;transition:background .1s
}
.user-menu-item:hover{background:var(--bg2);color:var(--text)}
.user-menu-item.danger{color:#993C1D}
.user-menu-item.danger:hover{background:#FAECE7}

/* ── 입력 ── */
.input-wrap{position:relative;margin-bottom:5px}
.main-input{
  width:100%;font-size:16px;font-weight:500;padding:13px 16px;
  border:0.5px solid var(--border2);border-radius:var(--radius);
  background:var(--surface);color:var(--text);outline:none;transition:border-color .15s
}
.main-input:focus{border-color:var(--text3)}
.main-input::placeholder{color:var(--text3);font-weight:400;font-size:14px}
.hint{font-size:11px;color:var(--text3);margin-bottom:10px;padding-left:2px;line-height:1.8}
.hint b{color:var(--text2);font-weight:500}

/* ── 드롭다운 ── */
.dd-wrap{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;display:none;box-shadow:0 6px 24px rgba(0,0,0,.09)}
.dd-wrap.open{display:block}
.dd-section{padding:5px 14px 3px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:0.5px solid var(--border);transition:background .08s}
.dd-item:last-child{border-bottom:none}
.dd-item:hover,.dd-item.focused{background:var(--bg2)}
.dd-name{font-weight:500;min-width:72px}
.dd-aliases{font-size:11px;color:var(--text3);flex:1}
.dd-tab{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--text3);border:0.5px solid var(--border)}

/* ── 유사항목 ── */
.similar-wrap{overflow:hidden;max-height:0;transition:max-height .2s ease}
.similar-wrap.open{max-height:100px;margin-bottom:8px}
.similar-inner{padding:9px 13px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm)}
.sim-label{font-size:10px;color:var(--text3);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em}
.sim-chips{display:flex;flex-wrap:wrap;gap:5px}
.sim-chip{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--surface);border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .1s}
.sim-chip:hover{background:var(--bg3);color:var(--text)}
.sim-chip.dup{border-color:var(--c-buy);color:var(--c-buy)}

/* ── 미리보기 ── */
.preview-row{display:flex;align-items:center;gap:8px;padding:10px 14px;margin-bottom:6px;background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border);min-height:44px}
.preview-token{font-size:15px;font-weight:500;flex:1}
.preview-token.empty{color:var(--text3);font-weight:400;font-size:13px}

/* ── pill ── */
.pill{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;display:inline-block}
.pill-todo{background:var(--c-todo-bg);color:var(--c-todo)}
.pill-sched{background:var(--c-sched-bg);color:var(--c-sched)}
.pill-buy{background:var(--c-buy-bg);color:var(--c-buy)}
.pill-ref{background:var(--c-ref-bg);color:var(--c-ref)}
.pill-think{background:var(--c-think-bg);color:var(--c-think)}
.pill-check{background:var(--c-check-bg);color:var(--c-check)}

/* ── 버튼 ── */
.add-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--surface);border:0.5px solid var(--border2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:background .12s;margin-bottom:1.5rem}
.add-btn:hover:not(:disabled){background:var(--bg2)}
.add-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── 참조 ── */
.ref-panel{margin-bottom:1.5rem}
.ref-block{margin-bottom:14px}
.ref-block-label{font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.ref-group{margin-bottom:8px}
.ref-group-name{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.v-chip{font-size:12px;padding:4px 11px;border-radius:20px;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .1s}
.v-chip:hover{border-color:var(--border2);background:var(--bg2);color:var(--text)}
.v-chip .al{font-size:10px;opacity:.5;margin-left:3px}

/* ── 목록 ── */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.list-title{font-size:13px;font-weight:500;color:var(--text2)}
.filter-group-label{font-size:10px;color:var(--text3);margin:6px 0 4px;letter-spacing:.04em;text-transform:uppercase;width:100%}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.f-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .1s}
.f-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text);font-weight:500}
.token-list{display:flex;flex-direction:column;gap:5px}
.t-row{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);transition:background .1s}
.t-row:hover{background:var(--bg2)}
.t-row.is-checked{border-left:3px solid var(--c-check);padding-left:10px;background:var(--c-check-bg)}
.t-check{width:16px;height:16px;cursor:pointer;accent-color:var(--c-check);flex-shrink:0}
.t-tok{font-size:14px;font-weight:500;flex:1;cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px}
.t-tok:hover{background:var(--bg3)}
.t-checked-tok{font-size:14px;font-weight:500;flex:1;color:var(--c-check)}
.t-pill-btn{background:none;border:none;cursor:pointer;padding:0;position:relative}
.t-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:.4;padding:0 2px;flex-shrink:0}
.t-del:hover{opacity:1}
.t-row.editing{flex-direction:column;align-items:stretch;gap:7px;padding:10px 13px}
.edit-input-wrap{position:relative}
.edit-input{width:100%;font-size:14px;font-weight:500;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);outline:none}
.edit-input:focus{border-color:var(--text3)}
.edit-hint{font-size:10px;color:var(--text3);margin-top:3px}
.edit-actions{display:flex;gap:6px}
.edit-save{flex:1;padding:6px;font-size:12px;font-weight:500;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);border:none;cursor:pointer}
.edit-cancel{flex:1;padding:6px;font-size:12px;border-radius:var(--radius-sm);background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);cursor:pointer}
.cat-popup{position:absolute;top:calc(100% + 4px);right:0;z-index:400;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;display:none;box-shadow:0 4px 16px rgba(0,0,0,.09);min-width:110px}
.cat-popup.open{display:block}
.cat-popup-item{padding:7px 13px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background .08s}
.cat-popup-item:last-child{border-bottom:none}
.cat-popup-item:hover{background:var(--bg2)}
.status-bar{font-size:11px;color:var(--text3);text-align:right;margin-bottom:6px;min-height:16px}
.status-bar.err{color:var(--c-buy)}
.empty{text-align:center;padding:28px;font-size:13px;color:var(--text3)}
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div id="login-screen">
  <div>
    <div class="login-logo">TapTheVerb</div>
    <div style="font-size:13px;color:var(--text3);margin-top:4px">taptheverb.life</div>
  </div>
  <div class="login-sub">생각을 동사+명사로 빠르게 토큰화하는 생산성 앱</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 계속하기
  </button>
  <div class="login-footer">로그인하면 데이터가 안전하게 저장되고<br>어디서든 접근할 수 있습니다</div>
</div>

<!-- ══ 앱 화면 ══ -->
<div id="app-screen">
  <!-- 유저 드롭다운 메뉴 -->
  <div class="user-menu" id="userMenu">
    <div class="user-menu-header">
      <div class="user-menu-name" id="menuName">—</div>
      <div class="user-menu-email" id="menuEmail">—</div>
    </div>
    <a href="planner.html" class="user-menu-item">📋 BxB 플래너</a>
    <div class="user-menu-item danger" onclick="signOut()">로그아웃</div>
  </div>

  <div class="shell">
    <!-- 네비바 -->
    <div class="navbar">
      <span class="nav-logo">TapTheVerb</span>
      <a href="planner.html" class="nav-planner">📋 BxB 플래너</a>
      <div id="avatarWrap"><div class="nav-avatar-placeholder" onclick="toggleMenu()">?</div></div>
    </div>

    <!-- 입력 -->
    <div class="input-wrap">
      <input class="main-input" id="mainInput"
        placeholder="과제`하기`할일  →  Enter"
        autocomplete="off" spellcheck="false"/>
      <div class="dd-wrap" id="mainDd"></div>
    </div>
    <div class="hint">
      <b>`</b> 입력 → 동사 자동완성 &nbsp;·&nbsp; 다시 <b>`</b> → 카테고리 &nbsp;·&nbsp; <b>Tab/↑↓</b> 선택 &nbsp;·&nbsp; <b>Enter</b> 추가
    </div>

    <div class="similar-wrap" id="simWrap">
      <div class="similar-inner">
        <span class="sim-label">이미 있는 항목</span>
        <div class="sim-chips" id="simChips"></div>
      </div>
    </div>

    <div class="preview-row" id="previewRow">
      <span class="preview-token empty" id="previewToken">명사 ` 동사 입력 후 미리보기</span>
    </div>

    <div class="status-bar" id="statusBar"></div>
    <button class="add-btn" id="addBtn" disabled onclick="commitAdd()">추가 (Enter)</button>

    <!-- 참조 -->
    <div class="ref-panel">
      <div class="ref-block">
        <div class="ref-block-label">동사 참조</div>
        <div id="verbRefGroups"></div>
      </div>
      <div class="ref-block">
        <div class="ref-block-label">카테고리 참조</div>
        <div class="chips" id="catChips"></div>
      </div>
    </div>

    <!-- 목록 -->
    <div>
      <div class="list-header">
        <span class="list-title">
          저장 항목 <span id="cnt">0</span>
          &nbsp;·&nbsp; ⊙ 체크 <span id="checkCnt" style="color:var(--c-check);font-weight:600">0</span>
        </span>
      </div>
      <div id="filterArea"></div>
      <div class="token-list" id="tokenList"><div class="empty">아직 항목이 없습니다</div></div>
    </div>
  </div>
</div>

<script>
/* ══════════════ SUPABASE ══════════════ */
const SB_URL="https://aqcdfnhzbrwqshyqvixb.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxY2Rmbmh6YnJ3cXNoeXF2aXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjkwNjcsImV4cCI6MjA4OTMwNTA2N30.-v4_czoeiinthnnqbFKj37ajE8lIJfiwkn-F220RxhE";
const sb=supabase.createClient(SB_URL,SB_KEY,{
  auth:{
    detectSessionInUrl:true,
    persistSession:true,
    storageKey:'taptheverb-auth'
  }
});

/* ══════════════ 인증 ══════════════ */
let currentUser=null;

async function signInWithGoogle(){
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin+'/index.html'}
  });
  if(error) alert('로그인 오류: '+error.message);
}

async function signOut(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('userMenu').classList.remove('open');
}

function toggleMenu(){
  document.getElementById('userMenu').classList.toggle('open');
}

// 세션 체크
let _loaded=false;
sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser=session.user;
    showApp(session.user);
    // INITIAL_SESSION(새로고침) + SIGNED_IN(첫 로그인) 모두 처리
    // 단, 같은 세션에서 중복 로드 방지
    const uid=session.user.id;
    if(!_loaded || _loaded!==uid){
      _loaded=uid;
      await loadFromDB();
    }
  } else if(event==='SIGNED_OUT'){
    _loaded=false;
    currentUser=null;
    tokens=[];
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    renderList();
  }
});

function showApp(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  // 아바타 — outerHTML 대신 innerHTML 방식으로 안전하게
  const name=user.user_metadata?.full_name||user.email||'User';
  const pic=user.user_metadata?.avatar_url;
  const avatarWrap=document.getElementById('avatarWrap');
  if(avatarWrap){
    if(pic){
      avatarWrap.innerHTML=`<img src="${pic}" alt="${name}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;cursor:pointer;border:0.5px solid var(--border2)" onclick="toggleMenu()">`;
    } else {
      avatarWrap.innerHTML=`<div class="nav-avatar-placeholder" onclick="toggleMenu()">${name.charAt(0).toUpperCase()}</div>`;
    }
  }
  const mn=document.getElementById('menuName');
  const me=document.getElementById('menuEmail');
  if(mn)mn.textContent=name;
  if(me)me.textContent=user.email||'';
}

document.addEventListener('click',e=>{
  if(!e.target.closest('#userMenu')&&!e.target.closest('#avatarWrap'))
    document.getElementById('userMenu').classList.remove('open');
});

/* ══════════════ 데이터 ══════════════ */
const VERB_GROUPS=[
  {group:"행동·실행",verbs:[
    {name:"하기",aliases:["하","처리","신청","납부","등록","발급","완료"],desc:"실행 가능한 모든 행위"},
    {name:"안하기",aliases:["안","제외","스킵","보류"],desc:"하지 않기로 결정"},
    {name:"만들기",aliases:["만","작성","제작","기획","개발","쓰기"],desc:"작성·제작·개발"},
    {name:"정리하기",aliases:["정","청소","분류","정돈"],desc:"청소·분류·정돈"},
    {name:"해결하기",aliases:["해","fix","수정","고치기"],desc:"문제 해결·수정"},
    {name:"관리하기",aliases:["관","운영","유지"],desc:"운영·유지·관리"},
    {name:"사용하기",aliases:["사용","활용","이용"],desc:"사용·활용"},

function setStatus(msg,isErr=false){
  const el=document.getElementById("statusBar");
  el.textContent=msg;el.className="status-bar"+(isErr?" err":"");
  if(!isErr)setTimeout(()=>{if(el.textContent===msg)el.textContent="";},3000);

/* ══ DB ══ */
async function loadFromDB(){
  if(!sb||!currentUser)return;
  setStatus("로드 중...");
  const{data,error}=await sb.from("items").select("*").order("created_at",{ascending:false});
  if(error){setStatus("로드 실패: "+error.message,true);return;}
  tokens=(data||[]).map(row=>({
    id:String(row.id),dbId:String(row.id),
    noun:row.noun,verb:row.verb,token:row.token,
    cat:CATS.find(c=>c.key===row.category_key)||CATS[0],
    checked:row.checked||false,
  }));
  setStatus(tokens.length+"개 로드됨");
  renderFilterArea();renderList();
}
async function saveToDB(item){
  if(!sb||!currentUser)return null;
  const{data,error}=await sb.from("items").insert({
    noun:item.noun,verb:item.verb,token:item.token,
    category:item.cat.name,category_key:item.cat.key,checked:false,
    user_id:currentUser.id,
  }).select().single();
  if(error){setStatus("저장 실패: "+error.message,true);return null;}
  return String(data.id);
}
async function updateInDB(dbId,fields){
  if(!sb||!dbId)return;
  const{error}=await sb.from("items").update(fields).eq("id",dbId);
  if(error)setStatus("수정 실패: "+error.message,true);
}
async function deleteFromDB(dbId){
  if(!sb||!dbId)return;
  await sb.from("items").delete().eq("id",dbId);
}

/* ══ 파싱 ══ */
function parse(raw){
  const f=raw.indexOf("`");
  if(f===-1)return{noun:raw.trim(),vq:"",cq:"",mode:"noun"};
  const s=raw.indexOf("`",f+1);
  const noun=raw.slice(0,f).trim();
  if(s===-1)return{noun,vq:raw.slice(f+1).trim(),cq:"",mode:"verb"};
  return{noun,vq:raw.slice(f+1,s).trim(),cq:raw.slice(s+1).trim(),mode:"cat"};
}
const av=()=>VERB_GROUPS.flatMap(g=>g.verbs);
function mV(q){if(!q)return av();const lq=q.toLowerCase();return av().filter(v=>v.name.startsWith(lq)||v.aliases.some(a=>a.startsWith(lq))||v.name.includes(lq));}
function mC(q){if(!q)return CATS;const lq=q.toLowerCase();return CATS.filter(c=>c.name.includes(lq)||c.key.includes(lq));}
function rV(q){if(!q)return null;const e=av().find(v=>v.name===q);if(e)return e;const m=mV(q);return m.length===1?m[0]:null;}
function rC(q){if(!q)return null;const e=CATS.find(c=>c.name===q||c.key===q);if(e)return e;const m=mC(q);return m.length===1?m[0]:null;}

/* ══ 메인 DD ══ */
function renderDD(el,items,mode,pickFn){
  if(!items.length){el.classList.remove("open");return;}
  const lbl=mode==="verb"?"동사 선택":"카테고리 선택";
  el.innerHTML=`<div class="dd-section">${lbl}</div>`+
    items.map((it,i)=>mode==="verb"
      ?`<div class="dd-item" data-i="${i}" onmousedown="${pickFn}(${i})"><span class="dd-name">${it.name}</span><span class="dd-aliases">${it.aliases.slice(0,5).join(" · ")}</span><span class="dd-tab">Tab</span></div>`
      :`<div class="dd-item" data-i="${i}" onmousedown="${pickFn}(${i})"><span class="pill ${it.cls}" style="font-size:11px;padding:2px 8px;pointer-events:none">${it.name}</span><span class="dd-aliases">${it.desc}</span><span class="dd-tab">Tab</span></div>`
    ).join("");
  el.classList.add("open");
}
function closeMainDd(){document.getElementById("mainDd").classList.remove("open");mainDdItems=[];mainDdFocus=-1;}
function pickMainDd(i){
  const inp=document.getElementById("mainInput");const p=parse(inp.value);
  if(mainDdMode==="verb")inp.value=p.noun+"`"+mainDdItems[i].name;
  else inp.value=p.noun+"`"+p.vq+"`"+mainDdItems[i].name;
  closeMainDd();onInput();inp.focus();
}
function focusMainDd(dir){
  const els=document.querySelectorAll("#mainDd .dd-item");
  els.forEach(e=>e.classList.remove("focused"));
  mainDdFocus=Math.max(0,Math.min(mainDdItems.length-1,mainDdFocus+dir));
  els[mainDdFocus]?.classList.add("focused");els[mainDdFocus]?.scrollIntoView({block:"nearest"});
}

/* ══ 유사항목 ══ */
function updateSimilar(noun){
  const wrap=document.getElementById("simWrap");
  if(!noun||noun.length<1){wrap.classList.remove("open");return;}
  const matches=tokens.filter(t=>t.noun.includes(noun)||noun.includes(t.noun)||(noun.length>=2&&t.noun.includes(noun.slice(0,2)))).slice(0,6);
  if(!matches.length){wrap.classList.remove("open");return;}
  wrap.classList.add("open");
  document.getElementById("simChips").innerHTML=matches.map(t=>{
    const isDup=t.noun===noun;
    return `<button class="sim-chip${isDup?" dup":""}" onclick="loadSimilar('${t.noun.replace(/'/g,"\\'")}','${t.verb}')" title="${t.token}">${t.token}${isDup?" ⚠":""}</button>`;
  }).join("");
}
function loadSimilar(noun,verb){
  const inp=document.getElementById("mainInput");
  inp.value=noun+"`"+verb;closeMainDd();onInput();inp.focus();
}

/* ══ 미리보기 ══ */
function updatePreview(p){
  const vObj=rV(p.vq);
  const pt=document.getElementById("previewToken");
  const pr=document.getElementById("previewRow");
  const btn=document.getElementById("addBtn");
  pr.querySelectorAll(".pill").forEach(e=>e.remove());
  if(!p.noun){pt.textContent="명사 ` 동사 입력 후 미리보기";pt.className="preview-token empty";btn.disabled=true;return;}
  if(!vObj){pt.textContent=p.noun+" ` ?";pt.className="preview-token";btn.disabled=true;return;}
  const cObj=rC(p.cq)||CATS.find(c=>c.key===VCAT[vObj.name]);
  pt.textContent=vObj.name+"-"+p.noun;pt.className="preview-token";
  if(cObj){const pill=document.createElement("span");pill.className="pill "+cObj.cls;pill.textContent=cObj.name;pr.appendChild(pill);}
  btn.disabled=false;
}
function onInput(){
  const raw=document.getElementById("mainInput").value;
  const p=parse(raw);
  if(p.mode==="verb"){mainDdItems=mV(p.vq);mainDdFocus=-1;mainDdMode="verb";renderDD(document.getElementById("mainDd"),mainDdItems,"verb","pickMainDd");}
  else if(p.mode==="cat"){mainDdItems=mC(p.cq);mainDdFocus=-1;mainDdMode="cat";renderDD(document.getElementById("mainDd"),mainDdItems,"cat","pickMainDd");}
  else closeMainDd();
  updateSimilar(p.noun);updatePreview(p);
}

/* ══ 추가 ══ */
async function commitAdd(){
  const raw=document.getElementById("mainInput").value;
  const p=parse(raw);const vObj=rV(p.vq);
  if(!p.noun||!vObj)return;
  const cObj=rC(p.cq)||CATS.find(c=>c.key===VCAT[vObj.name]);
  const token=vObj.name+"-"+p.noun;
  if(tokens.find(t=>t.token===token)){setStatus("이미 있는 항목: "+token,true);return;}
  const item={noun:p.noun,verb:vObj.name,token,cat:cObj,checked:false,id:"tmp-"+Date.now()};
  tokens.unshift(item);
  document.getElementById("mainInput").value="";closeMainDd();
  document.getElementById("simWrap").classList.remove("open");
  document.getElementById("previewToken").textContent="명사 ` 동사 입력 후 미리보기";
  document.getElementById("previewToken").className="preview-token empty";
  document.getElementById("previewRow").querySelectorAll(".pill").forEach(e=>e.remove());
  document.getElementById("addBtn").disabled=true;
  setStatus("저장 중...");renderList();
  const dbId=await saveToDB(item);
  if(dbId){item.id=dbId;item.dbId=dbId;setStatus("저장됨 ✓");renderList();}
}

/* ══ 수정 ══ */
function startEdit(id){if(editingId===id)return;editingId=id;_currentEditId=id;closeAllCatPopups();renderList();requestAnimationFrame(()=>{const inp=document.getElementById("editInput-"+id);if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}});}
function cancelEdit(){editingId=null;_currentEditId=null;editDdItems=[];editDdFocus=-1;renderList();}
function onEditInput(id){
  _currentEditId=id;
  const inp=document.getElementById("editInput-"+id);if(!inp)return;
  const p=parse(inp.value);
  const el=document.getElementById("editDd-"+id);if(!el)return;
  if(p.mode==="verb"){editDdItems=mV(p.vq);editDdFocus=-1;if(editDdItems.length)renderDD(el,editDdItems,"verb",`pickEditDd`);else el.classList.remove("open");}
  else if(p.mode==="cat"){editDdItems=mC(p.cq);editDdFocus=-1;if(editDdItems.length)renderDD(el,editDdItems,"cat",`pickEditDdCat`);else el.classList.remove("open");}
  else{el.classList.remove("open");editDdItems=[];}
}
function pickEditDd(i){
  const id=_currentEditId;if(!id)return;
  const inp=document.getElementById("editInput-"+id);if(!inp)return;
  const p=parse(inp.value);inp.value=p.noun+"`"+editDdItems[i].name+(p.cq?"`"+p.cq:"");
  document.getElementById("editDd-"+id)?.classList.remove("open");editDdItems=[];editDdFocus=-1;inp.focus();
}
function pickEditDdCat(i){
  const id=_currentEditId;if(!id)return;
  const inp=document.getElementById("editInput-"+id);if(!inp)return;
  const p=parse(inp.value);inp.value=p.noun+"`"+(rV(p.vq)?.name||p.vq||"")+"`"+editDdItems[i].name;
  document.getElementById("editDd-"+id)?.classList.remove("open");editDdItems=[];editDdFocus=-1;inp.focus();
}
function onEditKey(e,id){
  _currentEditId=id;
  const el=document.getElementById("editDd-"+id);
  if(el&&el.classList.contains("open")){
    if(e.key==="ArrowDown"){e.preventDefault();editDdFocus=Math.max(0,Math.min(editDdItems.length-1,editDdFocus+1));el.querySelectorAll(".dd-item").forEach((x,i)=>x.classList.toggle("focused",i===editDdFocus));}
    else if(e.key==="ArrowUp"){e.preventDefault();editDdFocus=Math.max(0,Math.min(editDdItems.length-1,editDdFocus-1));el.querySelectorAll(".dd-item").forEach((x,i)=>x.classList.toggle("focused",i===editDdFocus));}
    else if(e.key==="Tab"||e.key==="Enter"){
      e.preventDefault();
      const p=parse(document.getElementById("editInput-"+id)?.value||"");
      const isCat=(p.mode==="cat");
      if(editDdFocus>=0)isCat?pickEditDdCat(editDdFocus):pickEditDd(editDdFocus);
      else if(editDdItems.length>0)isCat?pickEditDdCat(0):pickEditDd(0);
      if(e.key==="Enter"){el.classList.remove("open");setTimeout(()=>saveEdit(id),30);}
    }
    else if(e.key==="Escape")el.classList.remove("open");
  }else{
    if(e.key==="Enter"){e.preventDefault();saveEdit(id);}
    else if(e.key==="Escape")cancelEdit();
  }
}
async function saveEdit(id){
  const inp=document.getElementById("editInput-"+id);if(!inp)return;
  const p=parse(inp.value.trim());
  const vObj=rV(p.vq);
  if(!p.noun||!vObj){setStatus("형식: 명사`동사",true);return;}
  const cObj=rC(p.cq)||CATS.find(c=>c.key===VCAT[vObj.name]);
  const newToken=vObj.name+"-"+p.noun;
  const item=tokens.find(t=>t.id===id);if(!item)return;
  if(newToken!==item.token&&tokens.find(t=>t.token===newToken)){setStatus("이미 있는 항목: "+newToken,true);return;}
  item.noun=p.noun;item.verb=vObj.name;item.token=newToken;item.cat=cObj;
  await updateInDB(item.dbId,{noun:p.noun,verb:vObj.name,token:newToken,category:cObj.name,category_key:cObj.key});
  setStatus("수정됨 ✓");editingId=null;_currentEditId=null;renderList();
}

/* ══ 카테고리 팝업 ══ */
function closeAllCatPopups(){document.querySelectorAll(".cat-popup.open").forEach(p=>p.classList.remove("open"));openCatPopupId=null;}
function toggleCatPopup(id,e){
  e.stopPropagation();
  if(openCatPopupId===id){closeAllCatPopups();return;}
  closeAllCatPopups();openCatPopupId=id;
  const btn=document.querySelector(`.t-pill-btn[data-id="${id}"]`);if(!btn)return;
  let popup=btn.querySelector(".cat-popup");
  if(!popup){
    popup=document.createElement("div");popup.className="cat-popup";
    popup.innerHTML=CATS.map(c=>`<div class="cat-popup-item" onmousedown="setCat('${id}','${c.key}')"><span class="pill ${c.cls}" style="font-size:11px;padding:2px 7px;pointer-events:none">${c.name}</span></div>`).join("");
    btn.appendChild(popup);
  }
  popup.classList.add("open");
}
async function setCat(id,catKey){
  const item=tokens.find(t=>t.id===id);if(!item)return;
  const cObj=CATS.find(c=>c.key===catKey);if(!cObj)return;
  item.cat=cObj;
  await updateInDB(item.dbId,{category:cObj.name,category_key:cObj.key});
  closeAllCatPopups();setStatus("카테고리 변경됨 ✓");renderList();
}

/* ══ 체크 ══ */
async function toggleCheck(id){
  const item=tokens.find(t=>t.id===id);if(!item)return;
  item.checked=!item.checked;
  await updateInDB(item.dbId,{checked:item.checked});renderList();
}

/* ══ 삭제 ══ */
async function deleteToken(id){
  const item=tokens.find(t=>t.id===id);if(!item)return;
  await deleteFromDB(item.dbId);
  tokens=tokens.filter(t=>t.id!==id);
  if(editingId===id){editingId=null;_currentEditId=null;}
  renderList();
}

/* ══ 필터 & 목록 ══ */
function setFilter(f){activeFilter=f;renderFilterArea();renderList();}
function setVerbFilter(v){activeVerbFilter=v;renderFilterArea();renderList();}
function renderFilterArea(){
  const area=document.getElementById("filterArea");
  const catBtns=`<button class="f-btn${activeFilter==="전체"?" active":""}" onclick="setFilter('전체')">전체</button>`+
    CATS.map(c=>`<button class="f-btn${activeFilter===c.name?" active":""}" onclick="setFilter('${c.name}')">${c.name}</button>`).join("")+
    `<button class="f-btn${activeFilter==="체크"?" active":""}" onclick="setFilter('체크')">⊙ 체크</button>`;
  const verbBtns=`<button class="f-btn${activeVerbFilter==="전체"?" active":""}" onclick="setVerbFilter('전체')">전체</button>`+
    av().map(v=>`<button class="f-btn${activeVerbFilter===v.name?" active":""}" onclick="setVerbFilter('${v.name}')">${v.name}</button>`).join("");
  area.innerHTML=
    `<div class="filter-group-label">카테고리</div><div class="filter-row">${catBtns}</div>`+
    `<div class="filter-group-label" style="margin-top:8px">동사</div><div class="filter-row" style="margin-bottom:12px">${verbBtns}</div>`;
}
function renderList(){
  let filtered=tokens;
  if(activeFilter==="체크")filtered=filtered.filter(t=>t.checked);
  else if(activeFilter!=="전체")filtered=filtered.filter(t=>t.cat.name===activeFilter);
  if(activeVerbFilter!=="전체")filtered=filtered.filter(t=>t.verb===activeVerbFilter);
  document.getElementById("cnt").textContent=tokens.length;
  const chk=tokens.filter(t=>t.checked).length;
  const cc=document.getElementById("checkCnt");if(cc)cc.textContent=chk;
  const list=document.getElementById("tokenList");
  if(!filtered.length){list.innerHTML='<div class="empty">항목이 없습니다</div>';return;}
  list.innerHTML=filtered.map(t=>{
    const qid=`'${t.id}'`;
    if(editingId===t.id)return`<div class="t-row editing" data-id="${t.id}">
      <div class="edit-input-wrap">
        <input class="edit-input" id="editInput-${t.id}" value="${t.noun}\`${t.verb}" autocomplete="off" spellcheck="false" oninput="onEditInput('${t.id}')" onkeydown="onEditKey(event,'${t.id}')"/>
        <div class="dd-wrap" id="editDd-${t.id}"></div>
      </div>
      <div class="edit-hint">형식: 명사\`동사\`카테고리 (카테고리 생략 가능)</div>
      <div class="edit-actions">
        <button class="edit-save" onclick="saveEdit('${t.id}')">저장 (Enter)</button>
        <button class="edit-cancel" onclick="cancelEdit()">취소 (Esc)</button>
      </div></div>`;
    return`<div class="t-row${t.checked?" is-checked":""}" data-id="${t.id}">
      <input type="checkbox" class="t-check" ${t.checked?"checked":""} onchange="toggleCheck(${qid})" title="오늘·곧 할 일로 체크"/>
      <span class="${t.checked?"t-checked-tok":"t-tok"}" onclick="startEdit(${qid})">${t.token}</span>
      <button class="t-pill-btn" data-id="${t.id}" onclick="toggleCatPopup(${qid},event)">
        <span class="pill ${t.cat.cls}">${t.cat.name}</span>
      </button>
      <button class="t-del" onclick="deleteToken(${qid})">✕</button>
    </div>`;
  }).join("");
  if(editingId){const inp=document.getElementById("editInput-"+editingId);if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
}

/* ══ 참조 패널 ══ */
function renderRef(){
  document.getElementById("verbRefGroups").innerHTML=VERB_GROUPS.map(g=>`
    <div class="ref-group">
      <div class="ref-group-name">${g.group}</div>
      <div class="chips">${g.verbs.map(v=>`<button class="v-chip" onclick="insertVerb('${v.name}')" title="${v.desc}">${v.name}<span class="al">${v.aliases.slice(0,3).join("·")}</span></button>`).join("")}</div>
    </div>`).join("");
  document.getElementById("catChips").innerHTML=CATS.map(c=>`

    </button>`).join("");
}
function insertVerb(name){const inp=document.getElementById("mainInput");const p=parse(inp.value);inp.value=(p.noun||"")+"`"+name;closeMainDd();onInput();inp.focus();}
function insertCat(name){const inp=document.getElementById("mainInput");const p=parse(inp.value);if(!p.noun)return;inp.value=p.noun+"`"+(rV(p.vq)?.name||p.vq||"")+"`"+name;closeMainDd();onInput();inp.focus();}

/* ══ 키보드 ══ */
document.getElementById("mainInput").addEventListener("input",onInput);
document.getElementById("mainInput").addEventListener("keydown",e=>{
  const dd=document.getElementById("mainDd");
  if(dd.classList.contains("open")){
    if(e.key==="ArrowDown"){e.preventDefault();focusMainDd(1);}
    else if(e.key==="ArrowUp"){e.preventDefault();focusMainDd(-1);}
    else if(e.key==="Tab"||e.key==="Enter"){
      e.preventDefault();
      if(mainDdFocus>=0)pickMainDd(mainDdFocus);else if(mainDdItems.length>0)pickMainDd(0);
      if(e.key==="Enter"){closeMainDd();setTimeout(()=>{if(!document.getElementById("addBtn").disabled)commitAdd();},50);}
    }
    else if(e.key==="Escape")closeMainDd();
  }else{if(e.key==="Enter"){e.preventDefault();if(!document.getElementById("addBtn").disabled)commitAdd();}}
});
document.addEventListener("click",e=>{
  if(!e.target.closest(".input-wrap"))closeMainDd();
  if(!e.target.closest(".t-pill-btn"))closeAllCatPopups();
});

renderRef();renderFilterArea();renderList();
</script>
